<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LSEG AI Transformation Diagnostic</title>
  <style>
    :root {
      --bg: #d7dfd4;
      --bg-strong: #edf2ec;
      --ink: #0f1512;
      --ink-2: #24302a;
      --muted: #62706a;
      --line: rgba(15, 21, 18, 0.16);
      --line-strong: rgba(15, 21, 18, 0.34);
      --panel: rgba(247, 248, 242, 0.86);
      --panel-solid: #f7f8f2;
      --green: #0b5f3a;
      --green-dark: #073722;
      --mint: #eef4e7;
      --amber: #badb39;
      --coral: #b75d43;
      --blue: #335d74;
      --brass: #c99a2e;
      --white: #ffffff;
      --shadow: 0 30px 90px rgba(15, 21, 18, 0.18);
      --shadow-tight: 0 16px 42px rgba(15, 21, 18, 0.12);
      --radius: 6px;
      --font-display: "DIN Condensed", "Bahnschrift Condensed", "Avenir Next Condensed", "Arial Narrow", sans-serif;
      --font-body: "Aptos", "Avenir Next", "Gill Sans", sans-serif;
      --font-serif: "Iowan Old Style", "Charter", Georgia, serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      color: var(--ink);
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
      background:
        linear-gradient(90deg, rgba(15, 21, 18, 0.08) 0 1px, transparent 1px 100%),
        var(--bg);
      font-family: var(--font-body);
    }

    button {
      font: inherit;
    }

    button:focus-visible {
      outline: 3px solid var(--amber);
      outline-offset: 3px;
    }

    .stage {
      position: relative;
      width: min(100vw, 177.78vh);
      height: min(56.25vw, 100vh);
      min-width: 960px;
      min-height: 540px;
      overflow: hidden;
      background:
        linear-gradient(90deg, transparent 0 7%, rgba(15, 21, 18, 0.08) 7% 7.18%, transparent 7.18% 16%),
        linear-gradient(135deg, var(--bg-strong), var(--bg) 46%, #c4d1ca);
      font-family: var(--font-body);
      isolation: isolate;
      animation: stageIn 420ms ease-out both;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: -18% -8%;
      background-image:
        linear-gradient(rgba(15, 21, 18, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15, 21, 18, 0.07) 1px, transparent 1px);
      background-size: 44px 44px;
      transform: rotate(-7deg);
      pointer-events: none;
      z-index: -2;
    }

    .stage::after {
      content: "";
      position: absolute;
      right: -7%;
      top: 0;
      bottom: auto;
      width: 34%;
      height: 100%;
      background:
        linear-gradient(145deg, transparent 0 20%, rgba(11, 95, 58, 0.18) 20% 21%, transparent 21% 46%, rgba(186, 219, 57, 0.34) 46% 47%, transparent 47% 66%, rgba(183, 93, 67, 0.18) 66% 67%, transparent 67%),
        linear-gradient(90deg, rgba(15, 21, 18, 0.12), transparent 52%);
      transform: skewX(-10deg);
      pointer-events: none;
      z-index: -1;
    }

    @keyframes stageIn {
      from {
        opacity: 0;
        transform: scale(0.992);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .app {
      position: relative;
      z-index: 1;
      height: 100%;
      display: grid;
      grid-template-rows: 72px minmax(0, 1fr) 70px;
      padding: 26px 34px 28px;
    }

    header,
    footer {
      border-color: var(--line);
    }

    header {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 26px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand img {
      width: 92px;
      height: auto;
      display: block;
    }

    .brand-divider {
      width: 1px;
      height: 38px;
      background: var(--line-strong);
    }

    .brand-title {
      line-height: 1.05;
      min-width: 0;
    }

    .brand-title strong,
    .counter strong,
    h1,
    .summary-hero h2,
    .board-top strong {
      font-family: var(--font-display);
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .brand-title strong {
      display: block;
      font-size: 21px;
      font-weight: 800;
    }

    .brand-title span {
      display: block;
      margin-top: 3px;
      font-size: 11px;
      color: var(--muted);
      font-weight: 760;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .progress {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 7px;
    }

    .dot {
      width: 32px;
      height: 6px;
      border-radius: 0;
      background: rgba(15, 21, 18, 0.18);
      transition: width 180ms ease, background 180ms ease, transform 180ms ease;
    }

    .dot.active {
      width: 54px;
      background: var(--green);
      transform: translateY(-2px);
    }

    .dot.done {
      background: var(--amber);
    }

    .counter {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .counter strong {
      color: var(--ink);
      font-size: 30px;
    }

    main {
      position: relative;
      min-height: 0;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: grid;
      opacity: 0;
      pointer-events: none;
      transform: translateY(16px);
      transition: opacity 260ms ease, transform 260ms ease;
    }

    .screen.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .intro {
      grid-template-columns: minmax(0, 0.9fr) minmax(460px, 1fr);
      gap: 38px;
      align-items: center;
    }

    .eyebrow {
      display: inline-flex;
      width: max-content;
      align-items: center;
      gap: 9px;
      padding: 7px 11px;
      border: 1px solid var(--line);
      border-left: 4px solid var(--amber);
      border-radius: 0;
      background: rgba(255, 255, 255, 0.42);
      color: var(--green-dark);
      font-size: 12px;
      font-weight: 850;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 0;
      background: var(--coral);
      transform: rotate(45deg);
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      max-width: 760px;
      margin-top: 28px;
      font-size: 78px;
      line-height: 0.86;
      font-weight: 900;
    }

    .intro-copy {
      max-width: 640px;
      margin-top: 24px;
      color: var(--ink-2);
      font-family: var(--font-serif);
      font-size: 22px;
      line-height: 1.35;
    }

    .intro-actions {
      display: flex;
      align-items: center;
      margin-top: 32px;
      gap: 12px;
    }

    .primary,
    .secondary,
    .nav-btn {
      border: 0;
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform 150ms ease, box-shadow 150ms ease, background 150ms ease, border-color 150ms ease;
    }

    .primary {
      min-width: 204px;
      min-height: 52px;
      padding: 0 20px;
      background: var(--ink);
      color: var(--white);
      box-shadow: 9px 9px 0 var(--amber);
      font-size: 16px;
      font-weight: 850;
    }

    .secondary {
      min-height: 52px;
      padding: 0 18px;
      background: rgba(255, 255, 255, 0.36);
      border: 1px solid var(--line-strong);
      color: var(--ink);
      font-size: 15px;
      font-weight: 800;
    }

    .primary:hover,
    .secondary:hover,
    .nav-btn:hover {
      transform: translate(-1px, -1px);
    }

    .intro-visual {
      position: relative;
      align-self: stretch;
      display: grid;
      place-items: center;
    }

    .intro-visual::before {
      content: "WORKFORCE SIGNALS";
      position: absolute;
      left: 0;
      top: 12%;
      padding: 7px 10px;
      background: var(--amber);
      color: var(--ink);
      font-size: 11px;
      font-weight: 900;
      transform: rotate(-8deg);
      z-index: 2;
    }

    .diagnostic-board {
      width: 100%;
      max-width: 600px;
      aspect-ratio: 1.14 / 1;
      border-radius: var(--radius);
      background: var(--panel);
      border: 1px solid var(--line-strong);
      box-shadow: var(--shadow);
      padding: 22px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 18px;
      backdrop-filter: blur(14px);
      transform: rotate(-1.2deg);
    }

    .board-top {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
    }

    .board-top strong {
      display: block;
      max-width: 260px;
      font-size: 29px;
      line-height: 0.92;
      font-weight: 900;
    }

    .board-top strong::after {
      content: "";
      display: block;
      width: 86px;
      height: 8px;
      margin-top: 12px;
      background: var(--green);
    }

    .board-top span,
    .board-bottom {
      color: var(--muted);
      font-size: 13px;
      font-weight: 850;
      text-transform: uppercase;
    }

    .signal-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      min-height: 0;
    }

    .signal {
      min-width: 0;
      border-radius: var(--radius);
      padding: 12px 10px;
      background: rgba(255, 255, 255, 0.52);
      border: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
    }

    .signal b {
      font-size: 12px;
      line-height: 1.12;
      overflow-wrap: anywhere;
    }

    .signal i {
      display: block;
      width: 100%;
      height: 6px;
      border-radius: 0;
      background: var(--green);
    }

    .signal:nth-child(2) i {
      background: var(--brass);
    }

    .signal:nth-child(3) i {
      background: var(--blue);
    }

    .signal:nth-child(4) i {
      background: var(--coral);
    }

    .signal:nth-child(5) i {
      background: var(--amber);
    }

    .board-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .question {
      display: grid;
      grid-template-columns: minmax(0, 0.7fr) minmax(520px, 1fr);
      gap: 28px;
      align-items: stretch;
      padding: 18px 0 0;
    }

    .question-copy {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
      padding-right: 4px;
    }

    .question-label {
      color: var(--green-dark);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h2 {
      font-family: var(--font-serif);
      font-size: 39px;
      line-height: 1.04;
      font-weight: 700;
    }

    .question-emphasis {
      color: var(--green-dark);
      font-weight: 800;
      box-shadow: inset 0 -0.28em 0 rgba(186, 219, 57, 0.45);
    }

    .question-hint {
      margin-top: 20px;
      max-width: 520px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.35;
      font-weight: 700;
    }

    .option-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-auto-rows: 1fr;
      gap: 12px;
      min-height: 0;
      align-content: center;
    }

    .option {
      position: relative;
      min-height: 168px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(247, 248, 242, 0.72);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      text-align: left;
      padding: 18px 20px;
      cursor: pointer;
      box-shadow: var(--shadow-tight);
      transition: transform 150ms ease, background 150ms ease, border 150ms ease, box-shadow 150ms ease;
      overflow: hidden;
    }

    .option::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 7px;
      height: 100%;
      background: var(--green);
      opacity: 0.18;
      transition: opacity 150ms ease, background 150ms ease;
    }

    .option:hover {
      transform: translate(-2px, -2px);
      border-color: var(--line-strong);
      box-shadow: 8px 8px 0 rgba(15, 21, 18, 0.12);
    }

    .option.selected {
      background: var(--white);
      border-color: var(--ink);
      box-shadow: 8px 8px 0 var(--amber);
    }

    .option.selected::before {
      opacity: 1;
      background: var(--amber);
    }

    .option.selected::after {
      content: "SELECTED";
      right: 16px;
      top: 16px;
      width: auto;
      height: auto;
      padding: 5px 7px;
      border-radius: 0;
      background: var(--ink);
      color: var(--white);
      box-shadow: none;
      font-size: 10px;
      font-weight: 900;
    }

    .option-code {
      display: inline-grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 0;
      background: rgba(15, 21, 18, 0.08);
      font-weight: 950;
    }

    .option-text {
      display: block;
      margin-top: 16px;
      padding-right: 58px;
      font-size: 24px;
      line-height: 1.12;
      font-weight: 600;
    }

    .summary {
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 14px;
      align-items: stretch;
      padding-top: 0;
    }

    .summary-hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 22px;
      align-items: end;
    }

    .summary-hero h2 {
      max-width: 900px;
      font-size: 54px;
      line-height: 0.9;
      font-weight: 900;
      text-transform: none;
    }

    .bridge-board {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 12px;
      min-height: 0;
      border: 1px solid rgba(7, 55, 34, 0.32);
      background:
        linear-gradient(135deg, rgba(238, 248, 232, 0.88), rgba(211, 229, 211, 0.72)),
        rgba(247, 248, 242, 0.52);
      box-shadow: var(--shadow-tight);
      padding: 12px;
      backdrop-filter: blur(12px);
    }

    .bridge-stack {
      display: grid;
      grid-template-rows: repeat(5, minmax(0, 1fr));
      gap: 8px;
      min-height: 0;
    }

    .bridge-card {
      display: grid;
      grid-template-columns: 42px minmax(0, 0.74fr) 24px minmax(0, 1.12fr);
      gap: 10px;
      align-items: stretch;
      min-height: 0;
      border: 1px solid rgba(7, 55, 34, 0.18);
      background: rgba(246, 252, 241, 0.74);
      overflow: hidden;
    }

    .bridge-card.unanswered {
      opacity: 0.72;
    }

    .bridge-card.mature {
      border-color: rgba(7, 55, 34, 0.42);
      background:
        linear-gradient(90deg, rgba(167, 213, 91, 0.24), transparent 42%),
        rgba(246, 252, 241, 0.86);
      box-shadow: inset 5px 0 0 #a7d55b;
    }

    .bridge-number {
      display: grid;
      place-items: center;
      background: var(--green-dark);
      color: var(--white);
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 900;
    }

    .bridge-card:nth-child(2) .bridge-number {
      background: #0b5f3a;
      color: var(--white);
    }

    .bridge-card:nth-child(3) .bridge-number {
      background: #2b7a4f;
    }

    .bridge-card:nth-child(4) .bridge-number {
      background: #5f9f55;
      color: var(--ink);
    }

    .bridge-card:nth-child(5) .bridge-number {
      background: #a7d55b;
      color: var(--ink);
    }

    .bridge-card.mature .bridge-number {
      background: var(--amber);
      color: var(--ink);
    }

    .bridge-card.mature .bridge-pain strong {
      color: var(--green-dark);
    }

    .bridge-pain,
    .bridge-module {
      min-width: 0;
      padding: 8px 0;
      align-self: center;
    }

    .bridge-pain strong,
    .bridge-module strong {
      display: block;
      font-size: 16px;
      line-height: 1.12;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .bridge-pain span,
    .bridge-module span {
      display: -webkit-box;
      margin-top: 4px;
      color: #4d675a;
      font-size: 11px;
      line-height: 1.18;
      font-weight: 700;
      overflow: hidden;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .bridge-arrow {
      position: relative;
      display: grid;
      place-items: center;
      align-self: stretch;
    }

    .bridge-arrow::before {
      content: "";
      position: absolute;
      left: 2px;
      right: 2px;
      width: 100%;
      height: 2px;
      background: rgba(7, 55, 34, 0.36);
    }

    .bridge-arrow::after {
      content: "";
      position: absolute;
      right: 1px;
      width: 8px;
      height: 8px;
      border-top: 2px solid rgba(7, 55, 34, 0.36);
      border-right: 2px solid rgba(7, 55, 34, 0.36);
      transform: rotate(45deg);
    }

    .bridge-module {
      padding-right: 12px;
    }

    .bridge-module .module-pills {
      display: flex;
      flex-wrap: wrap;
      margin-top: 6px;
      gap: 5px;
      max-width: 100%;
    }

    .bridge-module .module-pill {
      min-height: 22px;
      padding: 5px 8px;
      border-color: rgba(7, 55, 34, 0.18);
      background: rgba(7, 55, 34, 0.07);
      color: var(--green-dark);
      font-size: 11px;
      line-height: 1.05;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .bridge-module .module-pill.primary {
      background: var(--green);
      color: var(--white);
      border-color: transparent;
      box-shadow: inset 0 -3px 0 rgba(167, 213, 91, 0.9);
    }

    .summary-flow {
      display: grid;
      grid-template-rows: minmax(0, 0.94fr) 26px minmax(0, 1fr);
      gap: 8px;
      min-height: 0;
    }

    .summary-column {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 9px;
      min-height: 0;
    }

    .summary-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--green-dark);
      font-size: 12px;
      font-weight: 950;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .summary-heading span {
      color: var(--muted);
      font-weight: 800;
      text-transform: none;
    }

    .pain-stack,
    .linkage-stack,
    .flow-arrows {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 9px;
      min-height: 0;
    }

    .pain-card {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
      min-height: 0;
      overflow: hidden;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: rgba(247, 248, 242, 0.78);
      box-shadow: var(--shadow-tight);
      padding: 11px;
      backdrop-filter: blur(12px);
    }

    .pain-card.unanswered {
      opacity: 0.68;
    }

    .pain-index {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 0;
      background: var(--green-dark);
      color: var(--white);
      font-size: 13px;
      font-weight: 950;
    }

    .pain-card:nth-child(2) .pain-index {
      background: var(--brass);
      color: var(--ink);
    }

    .pain-card:nth-child(3) .pain-index {
      background: var(--blue);
    }

    .pain-card:nth-child(4) .pain-index {
      background: var(--coral);
    }

    .pain-card strong {
      display: block;
      font-size: 15px;
      line-height: 1.18;
      font-weight: 900;
    }

    .pain-card span {
      display: -webkit-box;
      margin-top: 4px;
      color: var(--green-dark);
      font-size: 12px;
      line-height: 1.18;
      font-weight: 850;
      overflow: hidden;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .pain-card em {
      display: -webkit-box;
      margin-top: 5px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.22;
      font-style: normal;
      font-weight: 650;
      overflow: hidden;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .flow-arrows {
      padding: 0;
    }

    .flow-arrow {
      display: grid;
      place-items: center;
      min-height: 0;
    }

    .flow-arrow::before {
      content: "";
      display: block;
      width: 100%;
      height: 24px;
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, transparent 0 46%, var(--amber) 46% 54%, transparent 54%),
        linear-gradient(90deg, var(--green-dark), var(--green));
      box-shadow: 0 12px 24px rgba(15, 21, 18, 0.16);
    }

    .linkage-card {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 9px;
      min-height: 0;
      overflow: hidden;
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: linear-gradient(135deg, var(--ink), var(--green-dark));
      color: var(--white);
      box-shadow: 0 16px 42px rgba(15, 21, 18, 0.16);
      padding: 11px;
    }

    .linkage-card:nth-child(2) {
      background: linear-gradient(135deg, var(--ink), #4f4217);
    }

    .linkage-card:nth-child(3) {
      background: linear-gradient(135deg, var(--ink), #183c57);
    }

    .linkage-card:nth-child(4) {
      background: linear-gradient(135deg, var(--ink), #5a3027);
    }

    .linkage-card strong {
      display: -webkit-box;
      font-size: 14px;
      line-height: 1.16;
      font-weight: 900;
      overflow: hidden;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
    }

    .linkage-card span {
      display: block;
      margin-top: 5px;
      color: rgba(255, 255, 255, 0.72);
      font-size: 10px;
      line-height: 1.2;
      font-weight: 650;
    }

    .module-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
      justify-content: flex-start;
    }

    .module-pill,
    .rail-chip {
      border-radius: 0;
      font-weight: 900;
    }

    .module-pill {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 5px 7px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.9);
      font-size: 9px;
      line-height: 1.04;
      white-space: normal;
    }

    .module-pill.primary {
      background: var(--amber);
      color: #201704;
      border-color: rgba(255, 255, 255, 0.28);
    }

    .demo-handoff {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      border-radius: var(--radius);
      border: 1px solid rgba(7, 55, 34, 0.32);
      background:
        linear-gradient(90deg, rgba(11, 95, 58, 0.16), transparent 46%),
        rgba(246, 252, 241, 0.72);
      color: var(--ink);
      padding: 11px 14px;
      box-shadow: var(--shadow-tight);
    }

    .demo-handoff a {
      display: block;
      width: fit-content;
      font-size: 18px;
      line-height: 1.08;
      font-weight: 800;
      color: #145849;
      text-decoration: none;
      text-underline-offset: 3px;
      transition: color 160ms ease, text-decoration-color 160ms ease;
    }

    .demo-handoff a:hover {
      color: #073722;
      text-decoration: underline;
      text-decoration-thickness: 1px;
    }

    .module-rail {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
      max-width: 500px;
    }

    .rail-chip {
      padding: 6px 8px;
      border: 1px solid rgba(7, 55, 34, 0.18);
      background: rgba(7, 55, 34, 0.07);
      color: var(--green-dark);
      font-size: 9.5px;
      white-space: nowrap;
    }

    footer {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: end;
      gap: 18px;
      border-top: 1px solid var(--line);
      padding-top: 16px;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    .nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }

    .nav-btn {
      min-width: 116px;
      min-height: 44px;
      padding: 0 17px;
      border: 1px solid var(--line-strong);
      background: rgba(255, 255, 255, 0.42);
      color: var(--ink);
      font-size: 14px;
      font-weight: 850;
    }

    .nav-btn.next {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--white);
      box-shadow: 6px 6px 0 var(--amber);
    }

    .nav-btn:disabled {
      cursor: default;
      opacity: 0.35;
      transform: none;
      box-shadow: none;
    }

    @media (max-width: 1000px), (max-height: 620px) {
      body {
        overflow: auto;
      }

      .stage {
        min-width: 0;
        min-height: 0;
      }

      .app {
        padding: 18px 20px 20px;
        grid-template-rows: 58px 1fr 58px;
      }

      h1 {
        font-size: 50px;
      }

      h2 {
        font-size: 28px;
      }

      .intro-copy,
      .question-hint {
        font-size: 16px;
      }

      .intro {
        grid-template-columns: minmax(0, 0.9fr) minmax(360px, 1fr);
        gap: 18px;
      }

      .question {
        grid-template-columns: minmax(0, 0.72fr) minmax(420px, 1fr);
      }

      .option {
        min-height: 132px;
        padding: 14px;
      }

      .option-text {
        font-size: 17px;
        margin-top: 12px;
        padding-right: 42px;
      }

      .summary-hero h2 {
        font-size: 38px;
      }

      .pain-card strong,
      .linkage-card strong {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="stage" role="application" aria-label="LSEG AI transformation diagnostic">
    <div class="app">
      <header>
        <div class="brand">
          <img src="dist/public/brand/01ai-logo-color.svg" alt="01.AI" />
          <div class="brand-divider"></div>
          <div class="brand-title">
            <strong>LSEG AI Workforce Transformation</strong>
            <span>Diagnostic interaction for Erica</span>
          </div>
        </div>
        <div class="progress" aria-label="Progress"></div>
        <div class="counter"><strong id="counterNow">00</strong><span id="counterTotal">/ 00</span></div>
      </header>

      <main id="screens"></main>

      <footer>
        <div class="status" id="statusText">Ready for the opening question.</div>
        <div class="nav">
          <button class="nav-btn prev" id="prevBtn" type="button" aria-label="Previous">Back</button>
          <button class="nav-btn next" id="nextBtn" type="button" aria-label="Next">Start</button>
        </div>
      </footer>
    </div>
  </div>

  <script>
    const questions = [
      {
        id: "readiness",
        label: "Readiness visibility",
        text: "Today, how confident are you that LSEG can see which teams are <span class=\"question-emphasis\">truly ready for AI adoption</span>, and which teams may look ready but <span class=\"question-emphasis\">lack domain depth or trust</span>?",
        hint: "Choose the description closest to Erica's current view.",
        options: [
          { code: "A", text: "We already have a team and role-level view of AI readiness, domain depth and trust", insight: "AI readiness is already managed as workforce intelligence, not just training or tool usage." },
          { code: "B", text: "We can identify readiness at BU / function level, but not at team or role level", insight: "Leadership has a broad view, but may not yet see adoption barriers at the team and role level." },
          { code: "C", text: "We can see pockets of readiness, but not the underlying resistance or trust issues", insight: "Momentum exists, but the adoption map is missing the reasons why it may or may not scale." },
          { code: "D", text: "We do not yet have a reliable map of AI readiness across the workforce", insight: "The organisation needs a sharper workforce intelligence layer before scaling AI adoption." }
        ]
      },
      {
        id: "drivers",
        label: "Informal transformation drivers",
        text: "Across 38,000 people, do you know who the <span class=\"question-emphasis\">real AI transformation catalysts</span> are -- not just the formal managers, but the people who can actually <span class=\"question-emphasis\">redesign work and bring others with them</span>?",
        hint: "Choose the closest current way LSEG finds real transformation drivers.",
        options: [
          { code: "A", text: "We already know the informal AI transformation drivers across priority teams", insight: "LSEG can already identify the people who redesign work and bring others with them." },
          { code: "B", text: "We rely on managers to nominate strong change agents", insight: "Nominations help, but can under-detect hidden influencers and expert networks." },
          { code: "C", text: "We know some informal drivers, but not systematically across the group", insight: "The signal exists, but it is not yet systematic enough for repeatable scaling." },
          { code: "D", text: "We do not yet have a data-backed way to identify AI-enabled DRIs", insight: "Driver identification can become a decisive HR and change-management lever." }
        ]
      },
      {
        id: "expertise",
        label: "Expert knowledge capture",
        text: "Which <span class=\"question-emphasis\">critical experts</span> would create the biggest business risk if they left before their <span class=\"question-emphasis\">judgement was captured and scaled</span>?",
        hint: "Choose the closest current visibility on scarce expert judgement.",
        options: [
          { code: "A", text: "We already capture critical expert judgement into workflows and agent instructions", insight: "Expert judgement is already being converted into reusable capability, not only succession coverage." },
          { code: "B", text: "We know critical roles, but not always the judgement or workflow knowledge behind them", insight: "Role coverage is visible, but tacit judgement and workflow dependency may remain exposed." },
          { code: "C", text: "We often identify expert dependency only when someone leaves or a project stalls", insight: "Knowledge capture is reacting to disruption rather than anticipating it." },
          { code: "D", text: "We do not yet have a systematic way to prioritise which expert judgement to capture", insight: "Expert-to-agent pairing needs a structured way to prioritise what to capture first." }
        ]
      },
      {
        id: "pilots",
        label: "Pilot friction",
        text: "In your AI pilots so far, where does progress slow down: technology readiness, <span class=\"question-emphasis\">business ownership</span>, <span class=\"question-emphasis\">employee trust</span>, <span class=\"question-emphasis\">risk approval</span>, or unclear <span class=\"question-emphasis\">human-AI responsibility</span>?",
        hint: "Choose the friction that most often slows scaling.",
        options: [
          { code: "A", text: "AI pilots already have clear owners, risk gates and human-AI responsibility", insight: "The operating model for AI pilots is already clear enough to support disciplined scaling." },
          { code: "B", text: "Business interest is high, but employee trust and adoption are uneven", insight: "Adoption depends on whether people believe the new model is fair and useful." },
          { code: "C", text: "Risk / compliance approval slows down scaling", insight: "Controls, policy and assurance need to be designed into the workflow early." },
          { code: "D", text: "Human-AI responsibility is unclear once pilots enter real workflows", insight: "Teams need a clearer line between human judgement, AI support and agent action." }
        ]
      },
      {
        id: "hrbp",
        label: "HRBP role in human-agent design",
        text: "How do HRBPs currently help business leaders decide which tasks should <span class=\"question-emphasis\">stay human-led</span>, which can be <span class=\"question-emphasis\">AI-augmented</span>, and which can be <span class=\"question-emphasis\">handed to agents</span>?",
        hint: "Choose how HRBPs most commonly engage today.",
        options: [
          { code: "A", text: "HRBPs already help design human-led, AI-augmented and agent-led work", insight: "HR is already shaping the human-agent operating model before roles and workflows are locked." },
          { code: "B", text: "HRBPs help with role impact, training and change communication, but not task redesign", insight: "HR supports adoption, but is not yet shaping the human-agent split." },
          { code: "C", text: "HRBPs participate in workforce planning, but lack tools to map human-AI task allocation", insight: "The intent exists, but HRBPs need practical instrumentation for task-level decisions." },
          { code: "D", text: "HRBPs are not yet systematically involved in human-agent operating model design", insight: "The transformation needs a stronger bridge between HR strategy and agentic workflow design." }
        ]
      }
    ];

    const intelligenceModules = {
      readiness: "AI Adoption Readiness Map",
      dri: "DRI Finder",
      retention: "Retention Radar",
      capture: "Knowledge Capture",
      ledger: "Promise Ledger"
    };

    const painPointMap = {
      readiness: {
        title: "Readiness visibility is too blunt",
        matureTitle: "Readiness intelligence is already in place",
        defaultSignal: "Training completion and tool usage do not show whether teams have domain depth, trust or redesign capacity.",
        linkage: "Turn adoption into a team and role-level readiness map.",
        matureLinkage: "Use the Readiness Map to maintain momentum and spot residual pockets of resistance.",
        modules: [
          { key: "readiness", role: "primary" },
          { key: "dri", role: "support" }
        ]
      },
      drivers: {
        title: "Real AI transformation drivers are hidden",
        matureTitle: "AI transformation drivers are already visible",
        defaultSignal: "Formal hierarchy does not always reveal who can redesign work, influence peers and manage AI workers.",
        linkage: "Find informal DRIs, then connect them to accountable delivery.",
        matureLinkage: "Use DRI Finder to scale proven transformation drivers into more workflows.",
        modules: [
          { key: "dri", role: "primary" },
          { key: "ledger", role: "support" }
        ]
      },
      expertise: {
        title: "Expert judgement is trapped in scarce people",
        matureTitle: "Expert judgement is already becoming reusable capability",
        defaultSignal: "Critical judgement often sits with long-tenured experts and becomes visible only when delivery or retention risk appears.",
        linkage: "Capture scarce judgement and surface related retention exposure.",
        matureLinkage: "Use Knowledge Capture to keep expanding expert-to-agent pairing across domains.",
        modules: [
          { key: "capture", role: "primary" },
          { key: "retention", role: "primary" }
        ]
      },
      pilots: {
        title: "AI pilots stall at ownership, trust and risk boundaries",
        matureTitle: "AI pilot governance is already scaling-ready",
        defaultSignal: "Scaling slows when business ownership, employee trust, risk approval or human-AI responsibility is unclear.",
        linkage: "Make commitments, blockers and responsibility lines visible before pilots scale.",
        matureLinkage: "Use Promise Ledger to keep ownership, risk gates and delivery commitments auditable.",
        modules: [
          { key: "ledger", role: "primary" },
          { key: "dri", role: "support" },
          { key: "readiness", role: "support" }
        ]
      },
      hrbp: {
        title: "HRBPs lack a task-level human-agent design tool",
        matureTitle: "HRBPs are already shaping human-agent work design",
        defaultSignal: "HR can support change, but needs sharper instrumentation to decide what stays human-led, AI-augmented or agent-led.",
        linkage: "Equip HRBPs to redesign work around capability, expert judgement and accountable owners.",
        matureLinkage: "Use workforce intelligence to keep task allocation dynamic as agents mature.",
        modules: [
          { key: "readiness", role: "primary" },
          { key: "capture", role: "support" },
          { key: "dri", role: "support" }
        ]
      }
    };

    const selections = new Map(questions.map((question) => [question.id, null]));
    let index = 0;
    const totalScreens = questions.length + 2;

    const screensEl = document.getElementById("screens");
    const progressEl = document.querySelector(".progress");
    const counterNowEl = document.getElementById("counterNow");
    const counterTotalEl = document.getElementById("counterTotal");
    const statusTextEl = document.getElementById("statusText");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function makeIntro() {
      const section = document.createElement("section");
      section.className = "screen intro";
      section.innerHTML = `
        <div>
          <div class="eyebrow">Executive diagnostic</div>
          <h1>Where is AI transformation really getting stuck?</h1>
          <p class="intro-copy">A short, click-through conversation before the product demo. The aim is to surface workforce strengths and gaps</p>
          <div class="intro-actions">
            <button class="primary" type="button" data-jump-next>Begin diagnostic</button>
            <button class="secondary" type="button" data-jump-summary>Skip to signals map</button>
          </div>
        </div>
        <div class="intro-visual">
            <div class="diagnostic-board">
              <div class="board-top">
              <strong>Five diagnostic questions</strong>
              <span>Choose one best fit</span>
            </div>
            <div class="signal-grid">
              <div class="signal"><b>Readiness visibility</b><i></i></div>
              <div class="signal"><b>Transformation drivers</b><i></i></div>
              <div class="signal"><b>Expert knowledge risk</b><i></i></div>
              <div class="signal"><b>Pilot friction</b><i></i></div>
              <div class="signal"><b>Human-agent design</b><i></i></div>
            </div>
            <div class="board-bottom"><span>LSEG context</span><span>No maturity score</span></div>
          </div>
        </div>
      `;
      return section;
    }

    function makeQuestion(question, questionIndex) {
      const section = document.createElement("section");
      section.className = "screen question";
      section.dataset.questionId = question.id;
      const options = question.options.map((option) => `
        <button class="option" type="button" data-question="${question.id}" data-option="${option.code}" aria-pressed="false">
          <span class="option-code">${option.code}</span>
          <span class="option-text">${option.text}</span>
        </button>
      `).join("");
      section.innerHTML = `
        <div class="question-copy">
          <div class="question-label">${pad(questionIndex + 1)} / ${pad(questions.length)} · ${question.label}</div>
          <h2>${question.text}</h2>
          <p class="question-hint">${question.hint}</p>
        </div>
        <div class="option-grid">${options}</div>
      `;
      return section;
    }

    function makeSummary() {
      const section = document.createElement("section");
      section.className = "screen summary";
      section.innerHTML = `
        <div class="summary-hero">
          <div>
            <div class="eyebrow">Workforce signals</div>
            <h2>These questions reveal where LSEG is strong, and where workforce intelligence is still needed.</h2>
          </div>
        </div>
        <div class="bridge-board">
          <div class="bridge-stack" id="bridgeStack"></div>
        </div>
        <div class="demo-handoff">
          <div>
            <a href="https://lseg-ai-workforce-intelligence-demo.vercel.app/#radar">Let's start the demo!</a>
          </div>
        </div>
      `;
      return section;
    }

    function build() {
      screensEl.appendChild(makeIntro());
      questions.forEach((question, questionIndex) => screensEl.appendChild(makeQuestion(question, questionIndex)));
      screensEl.appendChild(makeSummary());

      for (let i = 0; i < totalScreens; i += 1) {
        const dot = document.createElement("span");
        dot.className = "dot";
        progressEl.appendChild(dot);
      }

      screensEl.addEventListener("click", (event) => {
        const option = event.target.closest(".option");
        if (option) {
          const selectedCode = selections.get(option.dataset.question);
          selections.set(option.dataset.question, selectedCode === option.dataset.option ? null : option.dataset.option);
          syncOptionStates();
          updateFooter();
          return;
        }

        if (event.target.closest("[data-jump-next]")) {
          goTo(1);
          return;
        }

        if (event.target.closest("[data-jump-summary]")) {
          goTo(totalScreens - 1);
          return;
        }

      });

      prevBtn.addEventListener("click", () => goTo(index - 1));
      nextBtn.addEventListener("click", () => goTo(index + 1));
      document.addEventListener("keydown", (event) => {
        if (event.key === "ArrowRight") goTo(index + 1);
        if (event.key === "ArrowLeft") goTo(index - 1);
      });

      goTo(0);
    }

    function goTo(nextIndex) {
      index = Math.max(0, Math.min(totalScreens - 1, nextIndex));
      document.querySelectorAll(".screen").forEach((screen, screenIndex) => {
        screen.classList.toggle("active", screenIndex === index);
      });
      renderSummary();
      updateFooter();
    }

    function syncOptionStates() {
      document.querySelectorAll(".option").forEach((option) => {
        const selected = selections.get(option.dataset.question) === option.dataset.option;
        option.classList.toggle("selected", selected);
        option.setAttribute("aria-pressed", String(selected));
      });
    }

    function getPainRows() {
      return questions.map((question, questionIndex) => {
        const selectedCode = selections.get(question.id);
        const selectedOption = question.options.find((option) => option.code === selectedCode);
        const painConfig = painPointMap[question.id];
        return {
          number: questionIndex + 1,
          label: question.label,
          title: selectedOption && selectedOption.code === "A" ? painConfig.matureTitle : painConfig.title,
          signal: selectedOption ? `${selectedOption.code}. ${selectedOption.text}` : "Awaiting Erica's best-fit answer",
          insight: selectedOption ? selectedOption.insight : painConfig.defaultSignal,
          linkage: selectedOption && selectedOption.code === "A" ? painConfig.matureLinkage : painConfig.linkage,
          modules: painConfig.modules,
          answered: Boolean(selectedOption),
          mature: Boolean(selectedOption && selectedOption.code === "A")
        };
      });
    }

    function renderSummary() {
      const bridgeStackEl = document.getElementById("bridgeStack");
      if (!bridgeStackEl) return;

      const rows = getPainRows();

      bridgeStackEl.innerHTML = rows.map((item) => {
        const modulePills = item.modules.map((module) => `
          <span class="module-pill ${module.role === "primary" ? "primary" : ""}">${intelligenceModules[module.key]}</span>
        `).join("");
        return `
          <article class="bridge-card${item.answered ? "" : " unanswered"}${item.mature ? " mature" : ""}">
            <div class="bridge-number">${pad(item.number)}</div>
            <div class="bridge-pain">
              <strong>${item.title}</strong>
              <span>${item.answered ? item.signal : item.insight}</span>
            </div>
            <div class="bridge-arrow" aria-hidden="true"></div>
            <div class="bridge-module">
              <strong>${item.linkage}</strong>
              <div class="module-pills">${modulePills}</div>
            </div>
          </article>
        `;
      }).join("");
    }

    function updateFooter() {
      const dots = document.querySelectorAll(".dot");
      dots.forEach((dot, dotIndex) => {
        dot.classList.toggle("active", dotIndex === index);
        dot.classList.toggle("done", dotIndex < index);
      });

      counterNowEl.textContent = pad(index + 1);
      counterTotalEl.textContent = `/ ${pad(totalScreens)}`;
      prevBtn.disabled = index === 0;
      nextBtn.disabled = index === totalScreens - 1;
      nextBtn.textContent = index === 0 ? "Start" : index === totalScreens - 2 ? "Signals map" : "Next";

      if (index === 0) {
        statusTextEl.textContent = "Ready for the opening question.";
      } else if (index === totalScreens - 1) {
        statusTextEl.textContent = "Workforce signals ready for the product demo.";
      } else {
        const question = questions[index - 1];
        const selected = selections.get(question.id);
        statusTextEl.textContent = selected ? `Selected ${selected} for ${question.label}.` : "Choose the closest fit.";
      }
    }

    build();
  </script>
</body>
</html>
